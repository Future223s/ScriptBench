services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - backend-data:/data
      - ./backend:/app/backend
    command: ["uvicorn", "backend.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/backend"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: /data/economic_upheaval.db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WATCHFILES_FORCE_POLLING: "true"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
      CHOKIDAR_USEPOLLING: "true"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend-node_modules:/app/node_modules
      - frontend-next:/app/.next
    command: npm run dev -- -H 0.0.0.0 -p 3000
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://backend:8000
      API_WS_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_API_WS_BASE_URL: http://127.0.0.1:8000
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend

volumes:
  backend-data:
  frontend-node_modules:
  frontend-next:
