services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "backend.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: /data/economic_upheaval.db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  backend-data: